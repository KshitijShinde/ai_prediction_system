apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-prediction-api
  labels:
    app: ai-prediction-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-prediction-api
  template:
    metadata:
      labels:
        app: ai-prediction-api
    spec:
      containers:
      - name: ai-prediction-api
        image: DOCKERHUB_USERNAME/ai-prediction-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-api-secrets
              key: api-key
