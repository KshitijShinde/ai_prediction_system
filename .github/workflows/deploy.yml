name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Train ML Model
      run: |
        python ml_model/train.py

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ai-prediction-api:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Copy Manifests to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        source: "k8s/"
        target: "~/"

    - name: Deploy to Kubernetes on EC2
      uses: appleboy/ssh-action@v0.1.6
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        API_KEY: ${{ secrets.API_KEY }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        envs: DOCKERHUB_USERNAME,API_KEY
        script: |
          set -e
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          
          # Create secret if not exists
          sudo k3s kubectl create secret generic ai-api-secrets --from-literal=api-key=$API_KEY --dry-run=client -o yaml | sudo k3s kubectl apply -f -
          
          # Replace placeholder and apply
          sed -i "s/DOCKERHUB_USERNAME/$DOCKERHUB_USERNAME/g" ~/k8s/deployment.yaml
          
          sudo k3s kubectl apply -f ~/k8s/deployment.yaml
          sudo k3s kubectl apply -f ~/k8s/service.yaml
          sudo k3s kubectl apply -f ~/k8s/k8s-monitoring.yaml